<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Device Status Checker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f3d2e;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #145c43;
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #00c853;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .steps {
      margin-top: 20px;
      text-align: left;
      font-size: 14px;
    }

    .step {
      opacity: 0;
      margin: 5px 0;
    }

    .final {
      margin-top: 20px;
      font-weight: bold;
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Device Status Checker</h2>
  <p>Enter your IMEI</p>

  <input type="text" id="imei" placeholder="Enter IMEI number">
  <button onclick="startProcess()">Check Device</button>

  <div class="steps" id="steps"></div>

  <div class="final" id="finalMsg"></div>
</div>

<script>
const steps = [
  "Connecting to secure server...",
  "Fetching device information...",
  "Verifying IMEI validity...",
  "Checking network lock status...",
  "Analyzing device records...",
  "Finalizing report..."
];

function startProcess() {
  const imei = document.getElementById("imei").value;
  const stepsContainer = document.getElementById("steps");
  const finalMsg = document.getElementById("finalMsg");

  stepsContainer.innerHTML = "";
  finalMsg.style.display = "none";

  if (!imei) {
    alert("Please enter IMEI");
    return;
  }

  steps.forEach((step, index) => {
    const div = document.createElement("div");
    div.className = "step";
    div.innerText = step;
    stepsContainer.appendChild(div);

    gsap.to(div, {
      opacity: 1,
      delay: index * 1,
      duration: 0.5
    });
  });

  setTimeout(() => {
    finalMsg.innerText = "✅ Device check complete.\nNo issues detected. This is a demo system.";
    finalMsg.style.display = "block";

    gsap.from(finalMsg, {
      opacity: 0,
      y: 20,
      duration: 1
    });

  }, steps.length * 1000 + 500);
}
</script>

</body>
  </html>
